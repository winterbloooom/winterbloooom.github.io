  <p class="mono" style="color:var(--ink-faint)">2026.07</p>
  <p>
    블로그를 새 디자인으로 리뉴얼했습니다. 일부 글의 주소(URL)가 변경되었으며, 예전 주소로 접속하면
    자동으로 새 주소로 연결됩니다. 찾는 글이 보이지 않으면 상단의 검색 또는 카테고리를 이용해 주세요.
  </p>
  <h2>변경/예정 사항</h2>
  <ul>
    <li>전체 디자인 개편 및 다크모드 지원</li>
    <li>주소 체계 정리 (구 주소 → 새 주소 자동 연결)</li>
    <li>태그·시리즈별 보기 (예정)</li>
  </ul>
