# 카테고리 트리 단일 소스.
#   - name  : 게시글 front matter의 categories 값과 정확히 일치해야 함 (site.categories 키로 사용)
#   - slug  : URL 및 색상 토큰 키 (예: color 변수 --c-<slug>)
#   - icon  : 인라인 SVG 스프라이트의 <symbol id="i-<icon>">
# 이 파일 하나로 사이드바 · 홈 필터칩 · 카테고리 아카이브 페이지(_plugins/category_pages_generator.rb)를 모두 생성한다.
categories:
  - name: "Robotics"
    slug: robotics
    icon: car
    children:
      - { name: "Autonomous Vehicle", slug: autonomous-vehicle }
      - { name: "Perception",         slug: perception }
      - { name: "ROS",                slug: ros }
      - { name: "Control & Engineering", slug: control-engineering }

  - name: "AI"
    slug: ai
    icon: cpu
    children:
      - { name: "Computer Vision",  slug: computer-vision }
      - { name: "Deep Learning",    slug: deep-learning }
      - { name: "Machine Learning", slug: machine-learning }

  - name: "Programming"
    slug: programming
    icon: code
    children:
      - { name: "Algorithm",  slug: algorithm }
      - { name: "Python",     slug: python }
      - { name: "C++",        slug: cpp }
      - { name: "JavaScript", slug: javascript }
      - { name: "Others",     slug: others }

  - name: "Dev"
    slug: dev
    icon: terminal
    children:
      - { name: "Git",    slug: git }
      - { name: "Docker", slug: docker }

  - name: "Computer Science"
    slug: cs
    icon: monitor
    children:
      - { name: "Linux", slug: linux }

  - name: "Math"
    slug: math
    icon: sigma
    children:
      - { name: "Linear Algebra", slug: linear-algebra }
      - { name: "Math for ML",    slug: math-for-ml }
