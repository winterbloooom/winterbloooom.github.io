# ─────────────────────────────────────────────────────────────
# Site
# ─────────────────────────────────────────────────────────────
title: "winterbloooom"
tagline: "EunGi Han · 기술로 세상을 안전하게"
description: "로보틱스·컴퓨터비전·딥러닝 공부 기록. winterbloooom (한은기)의 개인 기술 블로그."
url: "https://winterbloooom.github.io"
baseurl: ""
lang: "ko-KR"
timezone: Asia/Seoul

# Author / social (중앙 선언 — 템플릿에 하드코딩 금지, _data/site.yml 도 참고)
author:
  name: "EunGi Han"
  handle: "winterbloooom"
  korean_name: "한은기"
  email: "winterbloooom@gmail.com"

# ─────────────────────────────────────────────────────────────
# Build
# ─────────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /:title/          # 플랫 URL (파일명 슬러그 유일성 확인됨). 구 URL은 redirect 플러그인이 처리
sass:
  style: compressed
  sass_dir: _sass

kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge

plugins:
  - jekyll-redirect-from
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

# ─────────────────────────────────────────────────────────────
# Front matter defaults
# ─────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# ─────────────────────────────────────────────────────────────
# Features / integrations
# ─────────────────────────────────────────────────────────────
disqus:
  shortname: "winterbloooom"        # 지연 로드 (스크롤 진입 시)

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-NDR0GLWHWZ"

feed:
  path: /feed.xml

# ─────────────────────────────────────────────────────────────
# Files
# ─────────────────────────────────────────────────────────────
# Pagefind 가 빌드 후 생성하는 검색 인덱스를 Jekyll 재빌드 시 지우지 않도록 보존
keep_files:
  - pagefind

include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - package.json
  - package-lock.json
  - README.md
  - LICENSE
  - Rakefile
  - plans
  - DESIGN.md
  - CLAUDE.md
  - "*.bak"
  - scripts
  - _config.yml.bak
encoding: "utf-8"
